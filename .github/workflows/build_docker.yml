name: Build Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "sha_short=${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"
          repo_lower="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "repo_lower=${repo_lower}" >> "${GITHUB_OUTPUT}"

      - name: Set image repository
        id: repo
        shell: bash
        run: echo "ghcr_repo=ghcr.io/${{ steps.version.outputs.repo_lower }}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 修改说明：GITHUB_TOKEN 在此仓库无法写入 GHCR，改用 Classic PAT
      # 需要仓库 Secrets 中配置 GHCR_PAT，且必须是 Classic PAT，勾选 write:packages 权限
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          provenance: false
          tags: |
            ${{ steps.repo.outputs.ghcr_repo }}:latest
            ${{ steps.repo.outputs.ghcr_repo }}:${{ steps.version.outputs.version }}
            ${{ steps.repo.outputs.ghcr_repo }}:${{ steps.version.outputs.tag }}
            ${{ steps.repo.outputs.ghcr_repo }}:${{ steps.version.outputs.sha_short }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}

      # 修改说明：每次构建成功后自动将 GHCR 包设置为 public，避免服务器拉取时出现 unauthorized
      # 使用 GHCR_PAT 调用 GitHub API，需要该 PAT 具有 write:packages 权限
      - name: Make GHCR package public
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          package_name="$(echo '${{ github.repository }}' | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')"
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GHCR_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/${{ github.repository_owner }}/packages/container/${package_name}/visibility" \
            -d '{"visibility":"public"}'
