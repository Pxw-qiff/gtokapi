name: Build Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "sha_short=${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"
          repo_lower="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "repo_lower=${repo_lower}" >> "${GITHUB_OUTPUT}"

      - name: Set image repository
        id: repo
        shell: bash
        run: echo "ghcr_repo=ghcr.io/${{ steps.version.outputs.repo_lower }}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 修改说明：删除旧的 private 包，让 GITHUB_TOKEN 重新创建 public 包
      # 需要仓库 Secrets 中配置 GHCR_PAT，且必须有 delete:packages 权限
      - name: Delete existing GHCR package
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          package_name="$(echo '${{ github.repository }}' | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')"
          curl -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GHCR_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/${package_name}" || true

      # 修改说明：参考 new-api 项目，使用 GITHUB_TOKEN 登录 GHCR
      # 需要仓库 Settings -> Actions -> General -> Workflow permissions 选择 "Read and write permissions"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          provenance: false
          tags: |
            ${{ steps.repo.outputs.ghcr_repo }}:latest
            ${{ steps.repo.outputs.ghcr_repo }}:${{ steps.version.outputs.version }}
            ${{ steps.repo.outputs.ghcr_repo }}:${{ steps.version.outputs.tag }}
            ${{ steps.repo.outputs.ghcr_repo }}:${{ steps.version.outputs.sha_short }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}