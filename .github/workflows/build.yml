name: Build and Release

on:
  workflow_dispatch:
  push:
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.rev.outputs.version }}
      tag: ${{ steps.rev.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read version
        id: rev
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: freebsd, goarch: amd64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X main.Version=${{ needs.version.outputs.version }}" \
            -o grok2api${{ matrix.goos == 'windows' && '.exe' || '' }} .
      - name: Package
        shell: bash
        run: |
          bin="grok2api"
          if [ "${{ matrix.goos }}" = "windows" ]; then bin="grok2api.exe"; fi
          archive="grok2api-${{ needs.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "${archive}" "${bin}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
        id: pack
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok2api-${{ needs.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.pack.outputs.archive }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: dist/*.tar.gz
